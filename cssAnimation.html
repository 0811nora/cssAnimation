<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cssAnimation.css">
    <title>CSS Animation 練習</title>
</head>
<body>
    <div class="wrap">
        <!-- 第一排-A區 -->
        <div class="area-A">
            <div class="area">
                <ul class="item-area-top">
                    <li class="dot-red"></li>
                    <li class="dot-yellow"></li>
                    <li class="dot-green"></li>
                </ul>
                <div class="item-area">
                    <div class="loading-circle"></div>
                </div>
            </div>

            <div class="area">
                <ul class="item-area-top">
                    <li class="dot-red"></li>
                    <li class="dot-yellow"></li>
                    <li class="dot-green"></li>
                </ul>
                <div class="item-area">
                    <div class="loading-line">
                        <div class="loading-line-content"></div>
                    </div>
                </div>
            </div>

            <div class="area">
                <ul class="item-area-top">
                    <li class="dot-red"></li>
                    <li class="dot-yellow"></li>
                    <li class="dot-green"></li>
                </ul>
                <div class="item-area">
                    <div class="loading-dot">
                        <div></div>
                        <div></div>
                        <div></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 第二排-B區 -->
        <div class="area-B">
            <div class="area">
                <ul class="item-area-top-two">
                    <li class="dot-red"></li>
                    <li class="dot-yellow"></li>
                    <li class="dot-green"></li>
                </ul>
                <div class="item-area-two">
                    <div class="box-hover">
                        <div></div>
                        <div></div>
                        <div></div>
                        <div></div>
                        <div></div>
                    </div>
                </div>
            </div>

             <div class="area">
                <ul class="item-area-top-two">
                    <li class="dot-red"></li>
                    <li class="dot-yellow"></li>
                    <li class="dot-green"></li>
                </ul>
                <div class="item-area-two">
                    <ul class="scroll">
                        <li>HAVE</li>
                        <li>A</li>
                        <li>NICE</li>
                        <li>DAY</li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- 第三排 - C區 -->
        <div class="area-C">
            <div class="area">
                <ul class="item-area-top">
                    <li class="dot-red"></li>
                    <li class="dot-yellow"></li>
                    <li class="dot-green"></li>
                </ul>
                <div class="item-area">
                    <h1 class="typing">Hello World ! . .</h1>
                </div>
            </div>

            <div class="area">
                <ul class="item-area-top">
                    <li class="dot-red"></li>
                    <li class="dot-yellow"></li>
                    <li class="dot-green"></li>
                </ul>
                <div class="item-area">
                    <h1 class="word-jump">
                        <span>H</span>
                        <span>E</span>
                        <span>L</span>
                        <span>L</span>
                        <span>O</span>
                        <span>!</span>
                    </h1>
                </div>
            </div>

            <div class="area">
                <ul class="item-area-top">
                    <li class="dot-red"></li>
                    <li class="dot-yellow"></li>
                    <li class="dot-green"></li>
                </ul>
                <div class="item-area wave">
                    <h1>Water</h1>
                    <h1>Water</h1>
                </div>
            </div>
        </div>

        <!-- 第四排 - D區 -->
        <div class="area-D">
            <div class="area">
                <ul class="item-area-top-two">
                    <li class="dot-red"></li>
                    <li class="dot-yellow"></li>
                    <li class="dot-green"></li>
                </ul>
                <div class="item-area-two">
                    <ul class="line">
                        <li></li>
                        <li></li>
                        <li></li>

                    </ul>
                </div>
            </div>

            <div class="area">
                <ul class="item-area-top-two">
                    <li class="dot-red"></li>
                    <li class="dot-yellow"></li>
                    <li class="dot-green"></li>
                </ul>
                <div class="item-area-two drip-container">
                    <div class="ball-a"></div>
                    <div class="ball-b"></div>
                </div>
            </div>

        </div>
    </div>
    

    <script src="cssAnimation.js"></script>
</body>
</html>
